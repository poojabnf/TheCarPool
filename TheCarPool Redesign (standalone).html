document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

off2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f62f1c1f-6feb-49e3-b6c2-9a49e53cda48\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"3636d545-2440-46dc-b700-86a5428c8050\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* Lode — Color tokens\n   ====================\n   Base palette (raw scales) + semantic aliases.\n   Light theme is the default on :root. Dark theme overrides under\n   [data-theme=\"dark\"]. Always build UI against the SEMANTIC aliases\n   (--text-*, --surface-*, --border-*, --gain/--loss), not raw scales. */\n\n:root {\n  /* ---- Neutral scale (cool, faint blue cast — the data-terminal grays) ---- */\n  --gray-0:   #FFFFFF;\n  --gray-25:  #FAFBFC;\n  --gray-50:  #F4F6F8;\n  --gray-100: #ECEFF2;\n  --gray-150: #E2E6EA;\n  --gray-200: #D6DBE1;\n  --gray-300: #BCC4CC;\n  --gray-400: #97A1AB;\n  --gray-500: #6B7682;\n  --gray-600: #4D5862;\n  --gray-700: #364049;\n  --gray-800: #212931;\n  --gray-900: #141A20;\n  --gray-950: #0B0F14;\n\n  /* ---- Brass — the single restrained metal accent. Use sparingly. ---- */\n  --brass-50:  #F7F0E0;\n  --brass-100: #EEE0C2;\n  --brass-300: #D8B673;\n  --brass-500: #B8893A;\n  --brass-600: #9A7130;\n  --brass-700: #7C5A26;\n\n  /* ---- Market semantics: green up / red down ---- */\n  --up-50:   #E6F4EE;\n  --up-500:  #0E8A5F;\n  --up-600:  #0B6E4C;\n  --up-700:  #085639;\n  --down-50: #FBEAE8;\n  --down-500:#D1453B;\n  --down-600:#B0352C;\n  --down-700:#8C2A23;\n\n  /* ---- Support semantics ---- */\n  --amber-50:  #FBF1DD;\n  --amber-500: #C9851A;\n  --amber-600: #A66C12;\n  --blue-50:   #E8F0FB;\n  --blue-500:  #2563B8;\n  --blue-600:  #1D4F95;\n\n  /* ---- Metal identity — used for the per-metal discs / dots only ---- */\n  --metal-gold:      #C9A227;\n  --metal-silver:    #9BA3AB;\n  --metal-platinum:  #8E9BA6;\n  --metal-palladium: #79858F;\n  --metal-copper:    #B5713B;\n  --metal-aluminum:  #A9B0B6;\n  --metal-nickel:    #8C8F7E;\n  --metal-zinc:      #7C8A93;\n\n  /* ================= SEMANTIC ALIASES — light (default) ================= */\n  --bg-app:        var(--gray-25);\n  --bg-base:       var(--gray-0);\n  --surface-card:  var(--gray-0);\n  --surface-sunken:var(--gray-50);\n  --surface-raised:var(--gray-0);\n  --surface-hover: var(--gray-50);\n  --surface-inset: var(--gray-100);\n\n  --border-subtle: var(--gray-150);\n  --border-default:var(--gray-200);\n  --border-strong: var(--gray-300);\n  --border-focus:  var(--gray-900);\n\n  --text-primary:  var(--gray-900);\n  --text-secondary:var(--gray-600);\n  --text-tertiary: var(--gray-500);\n  --text-disabled: var(--gray-400);\n  --text-inverse:  var(--gray-0);\n  --text-accent:   var(--brass-600);\n\n  --action-primary:       var(--gray-900);\n  --action-primary-hover: var(--gray-700);\n  --action-primary-text:  var(--gray-0);\n  --action-secondary:        var(--gray-0);\n  --action-secondary-hover:  var(--gray-50);\n  --action-secondary-text:   var(--gray-900);\n\n  --accent:        var(--brass-500);\n  --accent-soft:   var(--brass-50);\n\n  --gain:      var(--up-500);\n  --gain-strong: var(--up-600);\n  --gain-soft: var(--up-50);\n  --loss:      var(--down-500);\n  --loss-strong: var(--down-600);\n  --loss-soft: var(--down-50);\n  --warn:      var(--amber-500);\n  --warn-soft: var(--amber-50);\n  --info:      var(--blue-500);\n  --info-soft: var(--blue-50);\n\n  --focus-ring: 0 0 0 3px rgba(20, 26, 32, 0.16);\n  color-scheme: light;\n}\n\n/* ===================== Dark theme ===================== */\n[data-theme=\"dark\"] {\n  --bg-app:        #0B0F14;\n  --bg-base:       #10161D;\n  --surface-card:  #141B23;\n  --surface-sunken:#0D131A;\n  --surface-raised:#1A222B;\n  --surface-hover: #1B242E;\n  --surface-inset: #1E2832;\n\n  --border-subtle: #1F2932;\n  --border-default:#2A3640;\n  --border-strong: #3A4854;\n  --border-focus:  #EAEEF2;\n\n  --text-primary:  #EAEEF2;\n  --text-secondary:#9BA7B2;\n  --text-tertiary: #6B7682;\n  --text-disabled: #4D5862;\n  --text-inverse:  #0B0F14;\n  --text-accent:   #D8B673;\n\n  --action-primary:       #EAEEF2;\n  --action-primary-hover: #FFFFFF;\n  --action-primary-text:  #0B0F14;\n  --action-secondary:        #1A222B;\n  --action-secondary-hover:  #222C36;\n  --action-secondary-text:   #EAEEF2;\n\n  --accent:        #D8B673;\n  --accent-soft:   #2A2418;\n\n  --gain:        #19A974;\n  --gain-strong: #34C088;\n  --gain-soft:   #11241D;\n  --loss:        #E5564A;\n  --loss-strong: #F06B5F;\n  --loss-soft:   #2A1714;\n  --warn:        #DDA22E;\n  --warn-soft:   #2A2210;\n  --info:        #5B93E6;\n  --info-soft:   #122033;\n\n  --focus-ring: 0 0 0 3px rgba(234, 238, 242, 0.20);\n  color-scheme: dark;\n}\n<\u002Fstyle>\n<style>/* Lode — Typography tokens\n   =========================\n   Manrope for everything UI + display; JetBrains Mono for numbers,\n   prices, tickers and any tabular financial data. Prices ALWAYS use\n   --font-mono with tabular figures so digits align column-to-column. */\n\n:root {\n  --font-sans: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Type ramp — dense, institutional. 14px UI base. */\n  --text-2xs: 0.6875rem;  /* 11px — micro labels, table meta */\n  --text-xs:  0.75rem;    /* 12px — captions, badges */\n  --text-sm:  0.8125rem;  /* 13px — secondary UI text */\n  --text-base:0.875rem;   /* 14px — body / default UI */\n  --text-md:  0.9375rem;  /* 15px — emphasized body */\n  --text-lg:  1.0625rem;  /* 17px — card titles */\n  --text-xl:  1.25rem;    /* 20px — section heads */\n  --text-2xl: 1.5rem;     /* 24px */\n  --text-3xl: 1.875rem;   /* 30px */\n  --text-4xl: 2.375rem;   /* 38px */\n  --text-5xl: 3rem;       /* 48px */\n  --text-6xl: 4rem;       /* 64px — marketing display */\n\n  /* Weights */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-semibold:600;\n  --weight-bold:    700;\n  --weight-extrabold:800;\n\n  /* Line height */\n  --leading-none:   1;\n  --leading-tight:  1.15;\n  --leading-snug:   1.3;\n  --leading-normal: 1.5;\n  --leading-relaxed:1.65;\n\n  /* Tracking */\n  --tracking-tighter: -0.03em;\n  --tracking-tight:   -0.015em;\n  --tracking-normal:  0;\n  --tracking-wide:    0.02em;\n  --tracking-wider:   0.06em;  /* uppercase eyebrows / column heads */\n}\n<\u002Fstyle>\n<style>/* Lode — Spacing & sizing tokens\n   ===============================\n   4px base grid. Dense by default — institutional tables and panels\n   pack tightly. Use --space-* for padding/margin/gap. */\n\n:root {\n  --space-0:  0;\n  --space-px: 1px;\n  --space-1:  0.25rem;  /* 4 */\n  --space-2:  0.5rem;   /* 8 */\n  --space-3:  0.75rem;  /* 12 */\n  --space-4:  1rem;     /* 16 */\n  --space-5:  1.25rem;  /* 20 */\n  --space-6:  1.5rem;   /* 24 */\n  --space-7:  1.75rem;  /* 28 */\n  --space-8:  2rem;     /* 32 */\n  --space-10: 2.5rem;   /* 40 */\n  --space-12: 3rem;     /* 48 */\n  --space-16: 4rem;     /* 64 */\n  --space-20: 5rem;     /* 80 */\n  --space-24: 6rem;     /* 96 */\n  --space-32: 8rem;     /* 128 */\n\n  /* Component sizing */\n  --control-h-sm: 28px;\n  --control-h-md: 34px;\n  --control-h-lg: 40px;\n\n  /* Layout */\n  --container-max: 1280px;\n  --sidebar-w:     248px;\n  --topbar-h:      56px;\n}\n<\u002Fstyle>\n<style>/* Lode — Elevation: radii, borders, shadows\n   ==========================================\n   Restrained. Small radii, hairline borders, low-spread shadows.\n   The terminal feel comes from crisp 1px dividers, not big shadows. */\n\n:root {\n  /* Radii — institutional = tight */\n  --radius-xs:  3px;\n  --radius-sm:  5px;\n  --radius-md:  8px;\n  --radius-lg:  12px;\n  --radius-xl:  16px;\n  --radius-2xl: 22px;\n  --radius-full:9999px;\n\n  /* Border widths */\n  --border-hairline: 1px;\n  --border-thick:    1.5px;\n\n  /* Shadows — soft, cool-tinted, low spread */\n  --shadow-xs: 0 1px 1px rgba(13, 20, 28, 0.04);\n  --shadow-sm: 0 1px 2px rgba(13, 20, 28, 0.06), 0 1px 3px rgba(13, 20, 28, 0.05);\n  --shadow-md: 0 4px 10px rgba(13, 20, 28, 0.07), 0 1px 3px rgba(13, 20, 28, 0.05);\n  --shadow-lg: 0 12px 26px rgba(13, 20, 28, 0.10), 0 4px 8px rgba(13, 20, 28, 0.05);\n  --shadow-xl: 0 24px 48px rgba(13, 20, 28, 0.14);\n\n  /* Overlay scrim */\n  --scrim: rgba(13, 20, 28, 0.44);\n}\n\n[data-theme=\"dark\"] {\n  --shadow-xs: 0 1px 1px rgba(0, 0, 0, 0.30);\n  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.40), 0 1px 3px rgba(0, 0, 0, 0.30);\n  --shadow-md: 0 4px 10px rgba(0, 0, 0, 0.45), 0 1px 3px rgba(0, 0, 0, 0.35);\n  --shadow-lg: 0 14px 30px rgba(0, 0, 0, 0.55), 0 4px 8px rgba(0, 0, 0, 0.4);\n  --shadow-xl: 0 26px 52px rgba(0, 0, 0, 0.6);\n  --scrim: rgba(0, 0, 0, 0.6);\n}\n<\u002Fstyle>\n<style>/* Lode — Base reset & primitives\n   ===============================\n   Light-touch reset + body defaults so cards, components and UI kits\n   inherit the brand without per-file boilerplate. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--text-primary);\n  background: var(--bg-app);\n  font-weight: var(--weight-regular);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  font-weight: var(--weight-bold);\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--leading-tight);\n  color: var(--text-primary);\n}\n\np { margin: 0; }\n\na { color: inherit; text-decoration: none; }\n\nbutton { font-family: inherit; }\n\n/* Tabular numerals everywhere a price/figure appears */\n.tnum, .mono {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\" 1;\n}\n\n/* Market direction helpers */\n.up   { color: var(--gain); }\n.down { color: var(--loss); }\n\n/* Uppercase eyebrow / column-head label */\n.eyebrow {\n  font-size: var(--text-2xs);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-wider);\n  text-transform: uppercase;\n  color: var(--text-tertiary);\n}\n\n::selection { background: var(--brass-100); color: var(--gray-900); }\n[data-theme=\"dark\"] ::selection { background: #3a3018; color: #fff; }\n<\u002Fstyle>\n<style>/* Lode Design System — global entry point.\n   Consumers link THIS file only. Keep it as @import lines, nothing else. */\n/* Lode — Webfonts\n   ----------------\n   Manrope ........ geometric sans for UI + display\n   JetBrains Mono . monospace for prices, tickers, tabular data\n\n   Both are open-source (OFL) and ARE the intended faces — loaded from the\n   Google Fonts CDN here. For an offline/production build, self-host the woff2\n   files and replace this @import with local @font-face rules. */\n\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2692e75f-1be9-4450-832e-24d77ac6e751\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: ur  aliases.\n   Light theme is the default on :root. Dark theme overrides under\n   [data-theme=\"dark\"]. Always build UI against the SEMANTIC aliases\n   (--text-*, --surface-*, --border-*, --gain/--loss), not raw scales. */\n\n:root {\n  /* ---- Neutral scale (cool, faint blue cast — the data-terminal grays) ---- */\n  --gray-0:   #FFFFFF;\n  --gray-25:  #FAFBFC;\n  --gray-50:  #F4F6F8;\n  --gray-100: #ECEFF2;\n  --gray-150: #E2E6EA;\n  --gray-200: #D6DBE1;\n  --gray-300: #BCC4CC;\n  --gray-400: #97A1AB;\n  --gray-500: #6B7682;\n  --gray-600: #4D5862;\n  --gray-700: #364049;\n  --gray-800: #212931;\n  --gray-900: #141A20;\n  --gray-950: #0B0F14;\n\n  /* ---- Brass — the single restrained metal accent. Use sparingly. ---- */\n  --brass-50:  #F7F0E0;\n  --brass-100: #EEE0C2;\n  --brass-300: #D8B673;\n  --brass-500: #B8893A;\n  --brass-600: #9A7130;\n  --brass-700: #7C5A26;\n\n  /* ---- Market semantics: green up / red down ---- */\n  --up-50:   #E6F4EE;\n  --up-500:  #0E8A5F;\n  --up-600:  #0B6E4C;\n  --up-700:  #085639;\n  --down-50: #FBEAE8;\n  --down-500:#D1453B;\n  --down-600:#B0352C;\n  --down-700:#8C2A23;\n\n  /* ---- Support semantics ---- */\n  --amber-50:  #FBF1DD;\n  --amber-500: #C9851A;\n  --amber-600: #A66C12;\n  --blue-50:   #E8F0FB;\n  --blue-500:  #2563B8;\n  --blue-600:  #1D4F95;\n\n  /* ---- Metal identity — used for the per-metal discs / dots only ---- */\n  --metal-gold:      #C9A227;\n  --metal-silver:    #9BA3AB;\n  --metal-platinum:  #8E9BA6;\n  --metal-palladium: #79858F;\n  --metal-copper:    #B5713B;\n  --metal-aluminum:  #A9B0B6;\n  --metal-nickel:    #8C8F7E;\n  --metal-zinc:      #7C8A93;\n\n  /* ================= SEMANTIC ALIASES — light (default) ================= */\n  --bg-app:        var(--gray-25);\n  --bg-base:       var(--gray-0);\n  --surface-card:  var(--gray-0);\n  --surface-sunken:var(--gray-50);\n  --surface-raised:var(--gray-0);\n  --surface-hover: var(--gray-50);\n  --surface-inset: var(--gray-100);\n\n  --border-subtle: var(--gray-150);\n  --border-default:var(--gray-200);\n  --border-strong: var(--gray-300);\n  --border-focus:  var(--gray-900);\n\n  --text-primary:  var(--gray-900);\n  --text-secondary:var(--gray-600);\n  --text-tertiary: var(--gray-500);\n  --text-disabled: var(--gray-400);\n  --text-inverse:  var(--gray-0);\n  --text-accent:   var(--brass-600);\n\n  --action-primary:       var(--gray-900);\n  --action-primary-hover: var(--gray-700);\n  --action-primary-text:  var(--gray-0);\n  --action-secondary:        var(--gray-0);\n  --action-secondary-hover:  var(--gray-50);\n  --action-secondary-text:   var(--gray-900);\n\n  --accent:        var(--brass-500);\n  --accent-soft:   var(--brass-50);\n\n  --gain:      var(--up-500);\n  --gain-strong: var(--up-600);\n  --gain-soft: var(--up-50);\n  --loss:      var(--down-500);\n  --loss-strong: var(--down-600);\n  --loss-soft: var(--down-50);\n  --warn:      var(--amber-500);\n  --warn-soft: var(--amber-50);\n  --info:      var(--blue-500);\n  --info-soft: var(--blue-50);\n\n  --focus-ring: 0 0 0 3px rgba(20, 26, 32, 0.16);\n  color-scheme: light;\n}\n\n/* ===================== Dark theme ===================== */\n[data-theme=\"dark\"] {\n  --bg-app:        #0B0F14;\n  --bg-base:       #10161D;\n  --surface-card:  #141B23;\n  --surface-sunken:#0D131A;\n  --surface-raised:#1A222B;\n  --surface-hover: #1B242E;\n  --surface-inset: #1E2832;\n\n  --border-subtle: #1F2932;\n  --border-default:#2A3640;\n  --border-strong: #3A4854;\n  --border-focus:  #EAEEF2;\n\n  --text-primary:  #EAEEF2;\n  --text-secondary:#9BA7B2;\n  --text-tertiary: #6B7682;\n  --text-disabled: #4D5862;\n  --text-inverse:  #0B0F14;\n  --text-accent:   #D8B673;\n\n  --action-primary:       #EAEEF2;\n  --action-primary-hover: #FFFFFF;\n  --action-primary-text:  #0B0F14;\n  --action-secondary:        #1A222B;\n  --action-secondary-hover:  #222C36;\n  --action-secondary-text:   #EAEEF2;\n\n  --accent:        #D8B673;\n  --accent-soft:   #2A2418;\n\n  --gain:        #19A974;\n  --gain-strong: #34C088;\n  --gain-soft:   #11241D;\n  --loss:        #E5564A;\n  --loss-strong: #F06B5F;\n  --loss-soft:   #2A1714;\n  --warn:        #DDA22E;\n  --warn-soft:   #2A2210;\n  --info:        #5B93E6;\n  --info-soft:   #122033;\n\n  --focus-ring: 0 0 0 3px rgba(234, 238, 242, 0.20);\n  color-scheme: dark;\n}\n\n/* Lode — Typography tokens\n   =========================\n   Manrope for everything UI + display; JetBrains Mono for numbers,\n   prices, tickers and any tabular financial data. Prices ALWAYS use\n   --font-mono with tabular figures so digits align column-to-column. */\n\n:root {\n  --font-sans: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Type ramp — dense, institutional. 14px UI base. */\n  --text-2xs: 0.6875rem;  /* 11px — micro labels, table meta */\n  --text-xs:  0.75rem;    /* 12px — captions, badges */\n  --text-sm:  0.8125rem;  /* 13px — secondary UI text */\n  --text-base:0.875rem;   /* 14px — body / default UI */\n  --text-md:  0.9375rem;  /* 15px — emphasized body */\n  --text-lg:  1.0625rem;  /* 17px — card titles */\n  --text-xl:  1.25rem;    /* 20px — section heads */\n  --text-2xl: 1.5rem;     /* 24px */\n  --text-3xl: 1.875rem;   /* 30px */\n  --text-4xl: 2.375rem;   /* 38px */\n  --text-5xl: 3rem;       /* 48px */\n  --text-6xl: 4rem;       /* 64px — marketing display */\n\n  /* Weights */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-semibold:600;\n  --weight-bold:    700;\n  --weight-extrabold:800;\n\n  /* Line height */\n  --leading-none:   1;\n  --leading-tight:  1.15;\n  --leading-snug:   1.3;\n  --leading-normal: 1.5;\n  --leading-relaxed:1.65;\n\n  /* Tracking */\n  --tracking-tighter: -0.03em;\n  --tracking-tight:   -0.015em;\n  --tracking-normal:  0;\n  --tracking-wide:    0.02em;\n  --tracking-wider:   0.06em;  /* uppercase eyebrows / column heads */\n}\n\n/* Lode — Spacing & sizing tokens\n   ===============================\n   4px base grid. Dense by default — institutional tables and panels\n   pack tightly. Use --space-* for padding/margin/gap. */\n\n:root {\n  --space-0:  0;\n  --space-px: 1px;\n  --space-1:  0.25rem;  /* 4 */\n  --space-2:  0.5rem;   /* 8 */\n  --space-3:  0.75rem;  /* 12 */\n  --space-4:  1rem;     /* 16 */\n  --space-5:  1.25rem;  /* 20 */\n  --space-6:  1.5rem;   /* 24 */\n  --space-7:  1.75rem;  /* 28 */\n  --space-8:  2rem;     /* 32 */\n  --space-10: 2.5rem;   /* 40 */\n  --space-12: 3rem;     /* 48 */\n  --space-16: 4rem;     /* 64 */\n  --space-20: 5rem;     /* 80 */\n  --space-24: 6rem;     /* 96 */\n  --space-32: 8rem;     /* 128 */\n\n  /* Component sizing */\n  --control-h-sm: 28px;\n  --control-h-md: 34px;\n  --control-h-lg: 40px;\n\n  /* Layout */\n  --container-max: 1280px;\n  --sidebar-w:     248px;\n  --topbar-h:      56px;\n}\n\n/* Lode — Elevation: radii, borders, shadows\n   ==========================================\n   Restrained. Small radii, hairline borders, low-spread shadows.\n   The terminal feel comes from crisp 1px dividers, not big shadows. */\n\n:root {\n  /* Radii — institutional = tight */\n  --radius-xs:  3px;\n  --radius-sm:  5px;\n  --radius-md:  8px;\n  --radius-lg:  12px;\n  --radius-xl:  16px;\n  --radius-2xl: 22px;\n  --radius-full:9999px;\n\n  /* Border widths */\n  --border-hairline: 1px;\n  --border-thick:    1.5px;\n\n  /* Shadows — soft, cool-tinted, low spread */\n  --shadow-xs: 0 1px 1px rgba(13, 20, 28, 0.04);\n  --shadow-sm: 0 1px 2px rgba(13, 20, 28, 0.06), 0 1px 3px rgba(13, 20, 28, 0.05);\n  --shadow-md: 0 4px 10px rgba(13, 20, 28, 0.07), 0 1px 3px rgba(13, 20, 28, 0.05);\n  --shadow-lg: 0 12px 26px rgba(13, 20, 28, 0.10), 0 4px 8px rgba(13, 20, 28, 0.05);\n  --shadow-xl: 0 24px 48px rgba(13, 20, 28, 0.14);\n\n  /* Overlay scrim */\n  --scrim: rgba(13, 20, 28, 0.44);\n}\n\n[data-theme=\"dark\"] {\n  --shadow-xs: 0 1px 1px rgba(0, 0, 0, 0.30);\n  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.40), 0 1px 3px rgba(0, 0, 0, 0.30);\n  --shadow-md: 0 4px 10px rgba(0, 0, 0, 0.45), 0 1px 3px rgba(0, 0, 0, 0.35);\n  --shadow-lg: 0 14px 30px rgba(0, 0, 0, 0.55), 0 4px 8px rgba(0, 0, 0, 0.4);\n  --shadow-xl: 0 26px 52px rgba(0, 0, 0, 0.6);\n  --scrim: rgba(0, 0, 0, 0.6);\n}\n\n/* Lode — Base reset & primitives\n   ===============================\n   Light-touch reset + body defaults so cards, components and UI kits\n   inherit the brand without per-file boilerplate. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--text-primary);\n  background: var(--bg-app);\n  font-weight: var(--weight-regular);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  font-weight: var(--weight-bold);\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--leading-tight);\n  color: var(--text-primary);\n}\n\np { margin: 0; }\n\na { color: inherit; text-decoration: none; }\n\nbutton { font-family: inherit; }\n\n/* Tabular numerals everywhere a price/figure appears */\n.tnum, .mono {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\" 1;\n}\n\n/* Market direction helpers */\n.up   { color: var(--gain); }\n.down { color: var(--loss); }\n\n/* Uppercase eyebrow / column-head label */\n.eyebrow {\n  font-size: var(--text-2xs);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-wider);\n  text-transform: uppercase;\n  color: var(--text-tertiary);\n}\n\n::selection { background: var(--brass-100); color: var(--gray-900); }\n[data-theme=\"dark\"] ::selection { background: #3a3018; color: #fff; }\n\n<\u002Fstyle>\n<script src=\"8709baa9-1d5c-4f91-9ac7-20db46e3bc30\"><\u002Fscript>\n<script src=\"27c2fbce-d888-4c3f-98fc-ec8492cb3a05\"><\u002
