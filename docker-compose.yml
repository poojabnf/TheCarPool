version: '3.8'

services:
  # NOTE: PostgreSQL was removed — the database was migrated to Firestore.
  # MinIO was removed — Firebase Storage is used for all object storage needs.
  # Only Redis (cache) remains for local dev.
  redis:
    image: redis:7.0-alpine
    container_name: thecarpool-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
