name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thecarpool-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: thecarpool-backend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  web:
    name: Web build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thecarpool-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: thecarpool-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          # Public Firebase config — safe to expose; real values injected as
          # repo secrets so production builds use the correct project.
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

  mobile:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thecarpool-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: thecarpool-mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
